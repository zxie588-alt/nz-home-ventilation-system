<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Smart ventilation 60 second walkthrough storyboard</title>
  <desc id="desc">Six-panel storyboard for a 60-second portfolio walkthrough video.</desc>
  <rect width="1400" height="760" fill="#f6f8f7"/>
  <text x="48" y="58" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#1f2a2e">60-Second Walkthrough Storyboard</text>
  <text x="48" y="88" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#5e6a70">Smart NZ residential MVHR / ERV system: design, validation, controls and communication.</text>

  <g transform="translate(48,130)">
    <rect width="400" height="250" rx="8" fill="#ffffff" stroke="#d9e0df"/>
    <text x="24" y="42" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#1f2a2e">0-10s: Problem</text>
    <rect x="42" y="76" width="130" height="80" fill="#e8f4f2" stroke="#007c73"/>
    <rect x="220" y="76" width="110" height="80" fill="#fff3e8" stroke="#d86e20"/>
    <text x="54" y="195" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5e6a70">NZ home ventilation case study</text>
  </g>

  <g transform="translate(500,130)">
    <rect width="400" height="250" rx="8" fill="#ffffff" stroke="#d9e0df"/>
    <text x="24" y="42" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#1f2a2e">10-20s: HVAC Sizing</text>
    <text x="42" y="90" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#007c73">60 L/s normal</text>
    <text x="42" y="130" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#d86e20">85 L/s boost</text>
    <text x="42" y="170" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#1f2a2e">LGH-35 selection</text>
    <text x="42" y="210" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5e6a70">Airflow schedule + pressure estimate</text>
  </g>

  <g transform="translate(952,130)">
    <rect width="400" height="250" rx="8" fill="#ffffff" stroke="#d9e0df"/>
    <text x="24" y="42" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#1f2a2e">20-30s: NZ Context</text>
    <rect x="40" y="80" width="315" height="34" fill="#eef3f6" stroke="#90a4ae"/>
    <rect x="40" y="124" width="315" height="34" fill="#eef3f6" stroke="#90a4ae"/>
    <rect x="40" y="168" width="315" height="34" fill="#eef3f6" stroke="#90a4ae"/>
    <text x="56" y="103" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#1f2a2e">NZBC G4 / G4-AS1</text>
    <text x="56" y="147" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#1f2a2e">H1 Energy Efficiency</text>
    <text x="56" y="191" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#1f2a2e">Healthy Homes</text>
  </g>

  <g transform="translate(48,430)">
    <rect width="400" height="250" rx="8" fill="#ffffff" stroke="#d9e0df"/>
    <text x="24" y="42" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#1f2a2e">30-40s: SolidWorks Kit</text>
    <rect x="70" y="136" width="240" height="42" rx="21" fill="#dfeaf1" stroke="#1f2a2e"/>
    <rect x="54" y="105" width="72" height="95" fill="#1f2a2e"/>
    <rect x="310" y="112" width="46" height="82" fill="#d9e0df" stroke="#1f2a2e"/>
    <rect x="164" y="75" width="128" height="28" fill="#d9e0df" stroke="#1f2a2e"/>
    <text x="70" y="220" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5e6a70">Test duct + sensor pod + pressure taps</text>
  </g>

  <g transform="translate(500,430)">
    <rect width="400" height="250" rx="8" fill="#ffffff" stroke="#d9e0df"/>
    <text x="24" y="42" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#1f2a2e">40-50s: Dashboard</text>
    <rect x="44" y="78" width="100" height="70" fill="#e8f4f2" stroke="#007c73"/>
    <rect x="166" y="78" width="100" height="70" fill="#fff3e8" stroke="#d86e20"/>
    <path d="M48 205 C92 160 150 205 202 168 S294 166 350 196" fill="none" stroke="#007c73" stroke-width="5"/>
    <text x="64" y="120" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#1f2a2e">CO2</text>
    <text x="186" y="120" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#1f2a2e">Boost</text>
  </g>

  <g transform="translate(952,430)">
    <rect width="400" height="250" rx="8" fill="#ffffff" stroke="#d9e0df"/>
    <text x="24" y="42" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#1f2a2e">50-60s: Engineering Value</text>
    <text x="44" y="92" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#1f2a2e">Requirements</text>
    <text x="44" y="128" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#1f2a2e">FMEA</text>
    <text x="44" y="164" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#1f2a2e">Manufacturing package</text>
    <text x="44" y="200" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#1f2a2e">Clear limitations</text>
  </g>
</svg>
