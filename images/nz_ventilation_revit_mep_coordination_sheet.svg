<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1040" viewBox="0 0 1600 1040" role="img" aria-labelledby="title desc">
  <title id="title">Revit MEP coordination sheet for NZ residential MVHR / ERV</title>
  <desc id="desc">Portfolio BIM coordination sheet showing Revit MEP view list, duct systems, schedule fields and commissioning checks.</desc>
  <rect width="1600" height="1040" fill="#fffdf8"/>
  <rect x="44" y="44" width="1512" height="952" rx="18" fill="#ffffff" stroke="#181818" stroke-width="4"/>
  <rect x="72" y="72" width="1456" height="104" rx="12" fill="#e7f3ed" stroke="#181818" stroke-width="3"/>
  <text x="96" y="126" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800" fill="#181818">M-101 Revit MEP Coordination Sheet</text>
  <text x="96" y="158" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#004f49">NZ Residential MVHR / ERV Ventilation Design - BIM workflow and schedule handoff</text>
  <text x="1250" y="126" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#181818">Ricardo Xie</text>
  <text x="1250" y="154" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#5e5b54">Revit 2026 / MEP coordination</text>

  <rect x="84" y="210" width="720" height="500" rx="10" fill="#f6f1e8" stroke="#181818" stroke-width="3"/>
  <text x="112" y="252" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" fill="#181818">Plan View Logic</text>
  <rect x="150" y="324" width="560" height="270" fill="#ffffff" stroke="#181818" stroke-width="2"/>
  <path d="M205 388 H650 M205 502 H650 M332 324 V594 M518 324 V594" stroke="#b9b2a5" stroke-width="2"/>
  <rect x="520" y="376" width="72" height="48" rx="6" fill="#95a1a8" stroke="#181818" stroke-width="2"/>
  <text x="532" y="406" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="800" fill="#ffffff">MVHR</text>
  <path d="M520 398 C455 398 440 365 388 365" stroke="#118ab2" stroke-width="8" fill="none"/>
  <path d="M520 410 C455 440 420 480 350 480" stroke="#118ab2" stroke-width="8" fill="none"/>
  <path d="M592 394 C660 362 690 350 710 322" stroke="#16a34a" stroke-width="8" fill="none"/>
  <path d="M592 414 C680 445 700 490 724 542" stroke="#ff7a1a" stroke-width="8" fill="none"/>
  <circle cx="388" cy="365" r="18" fill="#d8ecff" stroke="#181818" stroke-width="2"/>
  <circle cx="350" cy="480" r="18" fill="#d8ecff" stroke="#181818" stroke-width="2"/>
  <circle cx="710" cy="322" r="18" fill="#dff7df" stroke="#181818" stroke-width="2"/>
  <circle cx="724" cy="542" r="18" fill="#ffe5d1" stroke="#181818" stroke-width="2"/>
  <text x="112" y="638" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#181818">System colours: Supply Air / Extract Air / Outdoor Air / Exhaust Air</text>
  <text x="112" y="666" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#181818">Main design case: 60 L/s balanced normal operation, 85 L/s boost extract check</text>

  <rect x="836" y="210" width="648" height="226" rx="10" fill="#ffffff" stroke="#181818" stroke-width="3"/>
  <text x="864" y="252" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" fill="#181818">Revit Browser Setup</text>
  <text x="884" y="296" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#181818">• M-101 Ventilation Plan - Level 1</text>
  <text x="884" y="328" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#181818">• M-201 MVHR Equipment and Duct Coordination</text>
  <text x="884" y="360" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#181818">• M-301 Airflow Schedule</text>
  <text x="884" y="392" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#181818">• M-401 Commissioning and Validation Notes</text>

  <rect x="836" y="464" width="648" height="246" rx="10" fill="#f6f1e8" stroke="#181818" stroke-width="3"/>
  <text x="864" y="506" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" fill="#181818">Schedule Fields</text>
  <text x="884" y="552" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#181818">Mark | System | Element type | Room / zone</text>
  <text x="884" y="584" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#181818">Design airflow L/s | Duct diameter mm | Velocity m/s</text>
  <text x="884" y="616" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#181818">Design pressure note | Commissioning check</text>
  <text x="884" y="666" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#004f49">Seed schedule: 10 equipment / terminal rows</text>

  <rect x="84" y="742" width="1400" height="180" rx="10" fill="#ffffff" stroke="#181818" stroke-width="3"/>
  <text x="112" y="786" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" fill="#181818">Coordination Checks</text>
  <text x="132" y="830" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#181818">1. MVHR service clearance and filter access visible in plan.</text>
  <text x="132" y="862" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#181818">2. Outdoor intake / exhaust separation shown and flagged for site review.</text>
  <text x="132" y="894" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#181818">3. Duct sizes, airflow tags and commissioning points linked to model schedule.</text>
  <text x="856" y="830" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#181818">4. Structural/wall penetrations and ceiling coordination treated as open items.</text>
  <text x="856" y="862" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#181818">5. Acoustic and grille data separated from completed portfolio evidence.</text>
  <text x="856" y="894" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#181818">6. Native RVT and clash review listed as next Revit-session deliverables.</text>

  <rect x="72" y="948" width="1456" height="28" rx="8" fill="#181818"/>
  <text x="96" y="968" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#fffdf8">Portfolio boundary: BIM coordination package and Revit-ready handoff, not a consent or construction issue drawing.</text>
</svg>
