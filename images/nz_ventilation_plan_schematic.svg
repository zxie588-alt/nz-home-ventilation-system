<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
<title id="title">NZ home ventilation plan schematic</title>
<desc id="desc">2D plan schematic showing supply, extract, outdoor air and exhaust routes for a concept New Zealand MVHR ventilation system.</desc>
<style>
  .bg { fill: #f7faf9; }
  .wall { stroke: #1f2a2e; stroke-width: 5; stroke-linecap: square; }
  .interior { stroke: #6b7478; stroke-width: 3; stroke-linecap: square; }
  .label { font: 16px Arial, sans-serif; fill: #1f2a2e; }
  .small { font: 13px Arial, sans-serif; fill: #36464d; }
  .duct-label { font: 12px Arial, sans-serif; fill: #263238; paint-order: stroke; stroke: #f7faf9; stroke-width: 4px; stroke-linejoin: round; }
  .legend { font: 14px Arial, sans-serif; fill: #1f2a2e; }
</style>
<rect class="bg" x="0" y="0" width="1200" height="800"/>
