<text class="small" x="965.2" y="123.8">MVHR / service</text>
<line x1="60" y1="760" x2="100" y2="760" stroke="#1265d8" stroke-width="7" stroke-linecap="round"/><text class="legend" x="110" y="765">Supply</text>
<line x1="240" y1="760" x2="280" y2="760" stroke="#e36c18" stroke-width="7" stroke-linecap="round"/><text class="legend" x="290" y="765">Extract</text>
<line x1="420" y1="760" x2="460" y2="760" stroke="#118a52" stroke-width="7" stroke-linecap="round"/><text class="legend" x="470" y="765">Outdoor air</text>
<line x1="600" y1="760" x2="640" y2="760" stroke="#7b8790" stroke-width="7" stroke-linecap="round"/><text class="legend" x="650" y="765">Exhaust</text>
<text class="small" x="60" y="35">Concept 12 m x 8 m plan. Normal mode: 60 L/s supply and 60 L/s extract. Boost extract check: 85 L/s.</text>
